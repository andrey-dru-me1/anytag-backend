name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Test with Nix on Linux (most reproducible)
  test-nix:
    name: Test with Nix (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - name: Start PostgreSQL with Docker
        run: |
          docker-compose up -d db
          sleep 5  # Wait for database to start

      - name: Show environment info
        run: |
          nix-shell --run "
            rustc --version
            cargo --version
            diesel --version
          "

      - name: Run migrations
        run: nix-shell --run "diesel migration run"

      - name: Build project
        run: nix-shell --run "cargo build"

      - name: Run tests
        run: nix-shell --run "cargo test"

      - name: Check formatting
        run: nix-shell --run "cargo fmt -- --check"

      - name: Run clippy
        run: nix-shell --run "cargo clippy -- -D warnings"

      - name: Cleanup
        if: always()
        run: docker-compose down

  # Test on macOS without Nix (for comparison)
  test-macos:
    name: Test on macOS (native)
    runs-on: macos-latest

    services:
      postgres:
        image: postgres:18.3-alpine3.23
        env:
          POSTGRES_USER: anytag
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: anytag
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install diesel-cli
        run: |
          cargo install diesel_cli \
            --version 2.3.0 \
            --no-default-features \
            --features postgres \
            --locked

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U anytag; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done

      - name: Run migrations
        run: diesel migration run

      - name: Build project
        run: cargo build

      - name: Run tests
        run: cargo test

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # Test on Windows (WSL2 simulation)
  test-windows:
    name: Test on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install diesel-cli
        run: |
          cargo install diesel_cli ^
            --version 2.3.0 ^
            --no-default-features ^
            --features postgres ^
            --locked

      - name: Build project
        run: cargo build

      - name: Run tests (without database)
        run: cargo test

      - name: Check formatting
        run: cargo fmt -- --check

  # Security audit
  security:
    name: Security audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build with Nix (production)
  build-nix:
    name: Build with Nix
    runs-on: ubuntu-latest
    needs: [test-nix, test-macos, test-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v26

      - name: Build with Nix
        run: |
          # Build the project using Nix
          nix-build --attr packages.default 2>/dev/null || echo "No flake.nix package defined"

          # Alternative: build with cargo in nix-shell
          nix-shell --run "cargo build --release"

          echo "Build completed successfully"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anytag-backend-binary
          path: target/release/anytag-backend
          if-no-files-found: ignore
