---
name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres@localhost:5432/anytag_test

jobs:
  # Test with Nix on Linux (most reproducible)
  test-nix:
    name: Test with Nix (Linux)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3-alpine3.23
        env:
          POSTGRES_HOST_AUTH_METHOD: trust  # No password for local connections
          POSTGRES_USER: postgres
          POSTGRES_DB: anytag_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3.17.0

      - name: Show environment info
        run: |
          nix develop --command bash -c "
            rustc --version
            cargo --version
            diesel --version
          "

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done

      - name: Run migrations
        run: nix develop --command diesel migration run

      - name: Build project
        run: nix develop --command cargo build

      - name: Run tests
        run: nix develop --command cargo test

      - name: Check formatting
        run: nix develop --command cargo fmt -- --check

      - name: Run clippy
        run: nix develop --command cargo clippy -- -D warnings


  # Build with Nix (production)
  build-nix:
    name: Build with Nix
    runs-on: ubuntu-latest
    needs: [test-nix]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3.17.0

      - name: Build with Nix
        run: |
          # Build the project using Nix
          nix build .#default 2>/dev/null \
            || echo "No flake.nix package defined"

          # Alternative: build with cargo in nix develop
          nix develop --command cargo build --release

          echo "Build completed successfully"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anytag-backend-binary
          path: target/release/anytag-backend
          if-no-files-found: ignore
